name: vital_sync
description: "VitalSync — AI-Powered Vernacular Health Guardian"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  percent_indicator: ^4.2.3
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.7
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5
  firebase_app_check: ^0.3.2+5

  # Networking & Data
  http: ^1.3.0
  web_socket_channel: ^3.0.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3

  # Voice & TTS
  flutter_tts: ^4.2.0

  # BLE (for future sensor integration)

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  audioplayers: ^6.5.1
  tflite_flutter: ^0.12.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/models/

